{% extends 'base.html' %}
{% block title %}Tomario Hotel - トップ{% endblock %}
{% block content %}
<section class="hero">
    <h1>Tomario Hotel へようこそ</h1>
    <p>特別なひとときを、あなたに。</p>
    <a href="{{ url_for('rooms') }}" class="btn">客室を見る</a>
</section>

<section class="search">
    <h2>空き部屋を検索</h2>
    <form action="{{ url_for('rooms') }}" method="get" class="search-form">
        <div class="form-group">
            <label for="check_in">チェックイン</label>
            <input type="date" id="check_in" name="check_in" required>
        </div>
        <div class="form-group">
            <label for="check_out">チェックアウト</label>
            <input type="date" id="check_out" name="check_out" required>
        </div>
        <button type="submit" class="btn">検索する</button>
    </form>
</section>
{% endblock %}
