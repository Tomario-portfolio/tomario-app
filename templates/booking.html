{% extends 'base.html' %}
{% block title %}予約 - Tomario Hotel{% endblock %}
{% block content %}
<div class="container">
    <h2>予約フォーム</h2>
    <div class="booking-summary">
        <h3>{{ room.room_type }}（{{ room.room_number }}号室）</h3>
        <p>¥{{ "{:,.0f}".format(room.price_per_night) }} / 泊</p>
    </div>
    <form method="post" class="auth-form" id="booking-form">
        <div class="form-group">
            <label for="check_in">チェックイン</label>
            <input type="date" id="check_in" name="check_in" value="{{ check_in }}" required>
        </div>
        <div class="form-group">
            <label for="check_out">チェックアウト</label>
            <input type="date" id="check_out" name="check_out" value="{{ check_out }}" required>
        </div>
        <div class="form-group">
            <p>合計金額：<span id="total-price">-</span></p>
        </div>
        <button type="submit" class="btn">予約を確定する</button>
    </form>
</div>
<script>
    const pricePerNight = {{ room.price_per_night }};
    function updateTotal() {
        const checkIn = document.getElementById('check_in').value;
        const checkOut = document.getElementById('check_out').value;
        if (checkIn && checkOut) {
            const nights = (new Date(checkOut) - new Date(checkIn)) / (1000 * 60 * 60 * 24);
            if (nights > 0) {
                document.getElementById('total-price').textContent = '¥' + (pricePerNight * nights).toLocaleString();
            } else {
                document.getElementById('total-price').textContent = '-';
            }
        }
    }
    document.getElementById('check_in').addEventListener('change', updateTotal);
    document.getElementById('check_out').addEventListener('change', updateTotal);
    updateTotal();
</script>
{% endblock %}
