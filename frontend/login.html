<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - Tomario Hotel</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/index.html" class="logo">Tomario Hotel</a>
            <div id="nav-auth"></div>
        </nav>
    </header>
    <main>
        <div class="auth-container">
            <h2>ログイン</h2>
            <p id="error-msg" class="error-msg"></p>
            <form class="auth-form" id="login-form">
                <div class="form-group">
                    <label for="email">メールアドレス</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">パスワード</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn">ログイン</button>
            </form>
            <p>アカウントをお持ちでない方は<a href="/register.html">こちら</a></p>
        </div>
    </main>
    <footer><p>&copy; 2024 Tomario Hotel. All rights reserved.</p></footer>
    <script src="/js/api.js"></script>
    <script>
        renderNav();
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await apiRequest('POST', '/auth/login', {
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                });
                const params = getParams();
                window.location.href = params.redirect || '/index.html';
            } catch (err) {
                showError(err.message);
            }
        });
    </script>
</body>
</html>
