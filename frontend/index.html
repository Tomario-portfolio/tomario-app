<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomario Hotel</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/index.html" class="logo">Tomario Hotel</a>
            <div id="nav-auth"></div>
        </nav>
    </header>
    <main>
        <section class="hero">
            <h1>Tomario Hotel へようこそ</h1>
            <p>特別なひとときを、あなたに。</p>
            <a href="/rooms.html" class="btn">客室を見る</a>
        </section>
        <section class="search">
            <h2>空き部屋を検索</h2>
            <form class="search-form" id="search-form">
                <div class="form-group">
                    <label for="check_in">チェックイン</label>
                    <input type="date" id="check_in" required>
                </div>
                <div class="form-group">
                    <label for="check_out">チェックアウト</label>
                    <input type="date" id="check_out" required>
                </div>
                <button type="submit" class="btn">検索する</button>
            </form>
        </section>
    </main>
    <footer><p>&copy; 2024 Tomario Hotel. All rights reserved.</p></footer>
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script>
        renderNav();
        document.getElementById('search-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const checkIn = document.getElementById('check_in').value;
            const checkOut = document.getElementById('check_out').value;
            window.location.href = `/rooms.html?check_in=${checkIn}&check_out=${checkOut}`;
        });
    </script>
</body>
</html>
